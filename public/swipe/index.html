<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://100jsw.vercel.app/favicon.ico" />
    <title>Tinder Swipe</title>
    <base href="/swipe/" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@500&family=Onest:wght@100..900&display=swap">
    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Onest", sans-serif;
            --font-mono: "Geist Mono", monospace;
        }

        article {
            @apply size-full absolute rounded-xl overflow-hidden;

            & .choice {
                @apply w-fit px-3 py-1 z-50 absolute top-8 right-4 font-bold text-xl tracking-tight border-3 rounded-xl;
                opacity: 0;

                &.nope {
                    @apply text-[#ff002b] border-[#ff002b] rotate-[30deg];
                }

                &.like {
                    @apply left-4 text-[#00ff53] border-[#00ff51] rotate-[-30deg];
                }
            }

            & img {
                @apply size-full object-cover;
            }

            & h2 {
                @apply size-full px-3 py-2 z-3 absolute inset-0 flex items-end font-medium text-xl tracking-tight text-stone-50 bg-linear-to-t from-stone-950/60 to-transparent select-none;
            }

            & span {
                @apply ml-2 font-light text-lg tracking-tighter text-stone-200;
            }
        }
    </style>
</head>
<body class="w-full h-dvh p-6 flex items-center justify-center text-stone-950 bg-linear-to-b from-[#ff7158] to-[#fd2b7b]">
    <header class="fixed top-6 left-8 z-50 hidden md:flex flex-col gap-0.5 tracking-tight text-stone-50">
        <h1 class="font-semibold">Tinder Swipe</h1>
        <span class="font-mono font-medium text-sm">#001</span>
    </header>

    <div class="h-full drop-shadow-lg drop-shadow-stone-950/20">
        <main class="w-[320px] max-w-[320px] h-full relative flex bg-[url(img/phone.webp)] bg-contain bg-center bg-no-repeat">
            <section class="w-full mx-6 my-5 xl:my-5.5 2xl:my-20 px-4 py-1.5 relative flex flex-col gap-6 rounded-4xl overflow-hidden">
                <div class="-z-10 absolute inset-0 bg-stone-100"></div>
                <header class="pt-1.5 pl-0.5 flex justify-start">
                    <img src="img/logo.webp" alt="Tinder Logo" class="size-6"/>
                </header>

                <div class="size-full m-0 relative">
                    <article>
                        <img src="photos/5.webp" alt="Clóe, 20y" />
                        <h2>Clóe <span>20</span></h2>
                        <div class="choice nope">NOPE</div>
                        <div class="choice like">LIKE</div>
                    </article>
                    <article>
                        <img src="photos/4.webp" alt="Sergi, 19y" />
                        <h2>Sergi <span>19</span></h2>
                        <div class="choice nope">NOPE</div>
                        <div class="choice like">LIKE</div>
                    </article>
                    <article>
                        <img src="photos/3.webp" alt="Fany, 22y" />
                        <h2>Fany <span>22</span></h2>
                        <div class="choice nope">NOPE</div>
                        <div class="choice like">LIKE</div>
                    </article>
                    <article>
                        <img src="photos/2.webp" alt="Álex, 24y" />
                        <h2>Álex <span>24</span></h2>
                        <div class="choice nope">NOPE</div>
                        <div class="choice like">LIKE</div>
                    </article>
                    <article>
                        <img src="photos/1.webp" alt="Leila, 23y" />
                        <h2>Leila <span>23</span></h2>
                        <div class="choice nope">NOPE</div>
                        <div class="choice like">LIKE</div>
                    </article>
                    <span class="h-full pt-8 -z-1 grid place-content-center font-medium text-sm text-center text-pretty text-stone-600">
                        There are no other people near you.<br />Try again later.
                    </span>
                </div>

                <footer class="pb-6 flex items-center justify-between *:size-8 *:bg-[url(img/icons.webp)] *:bg-size-[180px] *:bg-position-[0_0] *:bg-no-repeat *:border-0 *:rounded-full *:cursor-pointer *:transition-transform *:ease-in *:duration-150 *:hover:scale-110">
                    <button class="bg-position-[-147px_0]!" aria-label="undo"></button>
                    <button class="size-12! bg-size-[250px]! bg-position-[-150px_0]!" aria-label="remove"></button>
                    <button class="bg-position-[-73px_0]!" aria-label="star"></button>
                    <button class="size-12! bg-size-[250px]! bg-position-[-50px_0]!" aria-label="fav"></button>
                    <button aria-label="zap"></button>
                </footer>
            </section>
        </main>
    </div>

    <footer class="fixed bottom-6 right-8 z-50 hidden md:flex flex-col items-end gap-0.5 font-mono text-xs text-end uppercase tracking-tight text-stone-300 select-none *:transition *:hover:text-stone-50">
        <a href="https://javascript100.dev/01-tinder-swipe" target="_blank">Comparison</a>
        <a href="https://100jsw.vercel.app/">/ Projects</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
